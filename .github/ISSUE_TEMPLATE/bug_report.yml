name: Bug report
description: Report a product, UI, routing, or logic problem
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The page / flow / component that broke and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Give the shortest path to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Homepage
        - Rent tools
        - Evaluate flow
        - Report / Compare
        - Shanghai settlement handoff
        - Categories / Scenario pages
        - Search
        - Docs / README
        - Build / tooling
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots / logs / notes
      description: Paste screenshots, console errors, route info, or anything useful.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues first
          required: true
        - label: I included enough detail to reproduce the bug
          required: true