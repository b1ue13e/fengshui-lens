<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 赛博道士：荧光透镜 -->
  <style>
    .lens { fill: #10b981; }
    .ring { stroke: #10b981; stroke-width: 2; fill: none; }
    .glow { filter: drop-shadow(0 0 4px #10b981); }
    @media (prefers-color-scheme: dark) {
      .lens { fill: #34d399; }
      .ring { stroke: #34d399; }
    }
  </style>
  <!-- 外环 -->
  <circle cx="16" cy="16" r="14" class="ring glow"/>
  <!-- 内透镜 -->
  <circle cx="16" cy="16" r="8" class="lens glow"/>
  <!-- 十字准星 -->
  <path d="M16 6v4M16 22v4M6 16h4M22 16h4" stroke="#10b981" stroke-width="1.5" class="glow"/>
</svg>
